<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botão JS</title>
</head>
<body>
    <h1>Ola Mundo</h1>
    <p>Clique no botão para ver uma mensagem:</p>
    <button onclick="Mostrarmensagem()">Clique aqui</button> 
    <script>
        function Mostrarmensagem() {
            window.alert("Estou aprendendo JavaScript!");
            window.alert("Estou gostando.");
        }
    </script>
</body>
</html>
